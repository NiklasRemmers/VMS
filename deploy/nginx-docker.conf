# Nginx Configuration for Contract Maker (Docker + HTTPS)
# HTTP → HTTPS Redirect
server {
    listen 80;
    server_name 81f44996-d82c-4444-ac4d-30a4aff809e6.ul.bw-cloud-instance.org;
    # Let's Encrypt Challenge (für Erneuerung)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$server_name$request_uri;
    }
}
# HTTPS Server
server {
    listen 443 ssl http2;
    server_name 81f44996-d82c-4444-ac4d-30a4aff809e6.ul.bw-cloud-instance.org;
    # TLS Zertifikate (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/81f44996-d82c-4444-ac4d-30a4aff809e6.ul.bw-cloud-instance.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/81f44996-d82c-4444-ac4d-30a4aff809e6.ul.bw-cloud-instance.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    # Security Headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Request Limits
    client_max_body_size 10M;
    client_body_timeout 30s;
    client_header_timeout 30s;
    # Static Files
    location /static/ {
        alias /app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    # Proxy zu Gunicorn
    location / {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
