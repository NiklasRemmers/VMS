services:
  # ─── PostgreSQL Database ───
  db:
    image: postgres:16-alpine
    container_name: vms_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 88904f96dc92e9d07aeeda152711cd05c9fe6fc154f14bf276d0f0fa35074ff4
      POSTGRES_DB: vms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d vms" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Flask Application (Gunicorn) ───
  app:
    build: .
    container_name: vms_app
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://admin:88904f96dc92e9d07aeeda152711cd05c9fe6fc154f14bf276d0f0fa35074ff4@db:5432/vms
      - FLASK_ENV=production
      - GUNICORN_BIND=0.0.0.0:8000
      - GUNICORN_WORKERS=2
      - GUNICORN_ACCESS_LOG=-
      - GUNICORN_ERROR_LOG=-
      - KMS_MASTER_KEY_PATH=/etc/vms/master.key
    volumes:
      - kms_data:/etc/vms
      - app_secrets:/app/secrets_store
      - app_signatures:/app/signatures
      - app_static_signatures:/app/static/signatures
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "8000"

  # ─── Nginx Reverse Proxy ───
  nginx:
    image: nginx:alpine
    container_name: vms_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/app/static:ro
      - certbot_www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    restart: unless-stopped
  certbot:
    image: certbot/certbot
    container_name: vms_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h; certbot renew; done'"
volumes:
  pgdata:
  kms_data:
  app_secrets:
  app_signatures:
  app_static_signatures:
  certbot_www:
  certbot_certs:
